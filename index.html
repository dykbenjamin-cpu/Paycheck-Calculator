<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paycheck Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Paycheck Calculator</h1>

      <form id="paycheck-form" novalidate>
        <section class="card">
          <h2>Hours Worked</h2>
          <div class="field-group">
            <label for="regular-hours">Regular Hours</label>
            <input
              type="number"
              id="regular-hours"
              name="regular-hours"
              min="0"
              step="0.01"
              placeholder="0.00"
            />
          </div>
          <div class="field-group">
            <label for="ot1-hours">
              Overtime Hours
              <span class="badge">1.5×</span>
            </label>
            <input
              type="number"
              id="ot1-hours"
              name="ot1-hours"
              min="0"
              step="0.01"
              placeholder="0.00"
            />
          </div>
          <div class="field-group">
            <label for="ot2-hours">
              Double Overtime Hours
              <span class="badge badge-gold">2×</span>
            </label>
            <input
              type="number"
              id="ot2-hours"
              name="ot2-hours"
              min="0"
              step="0.01"
              placeholder="0.00"
            />
          </div>
        </section>

        <section class="card">
          <h2>Pay Rate</h2>
          <div class="field-group">
            <label for="wage">Hourly Wage ($)</label>
            <input
              type="number"
              id="wage"
              name="wage"
              min="0"
              step="0.01"
              placeholder="0.00"
            />
          </div>
        </section>

        <section class="card">
          <h2>Benefits</h2>
          <div class="field-group">
            <label for="vacation-pct">
              Vacation Pay Rate (%)
              <span class="hint">Percentage of gross pay</span>
            </label>
            <input
              type="number"
              id="vacation-pct"
              name="vacation-pct"
              min="0"
              max="100"
              step="0.01"
              placeholder="0.00"
            />
          </div>
          <div class="field-group">
            <label for="pension-pct">
              Pension Rate (%)
              <span class="hint">Percentage of wage × hours worked</span>
            </label>
            <input
              type="number"
              id="pension-pct"
              name="pension-pct"
              min="0"
              max="100"
              step="0.01"
              placeholder="0.00"
            />
          </div>
        </section>

        <div id="error-message" class="error hidden" role="alert"></div>

        <div class="actions">
          <button type="submit" class="btn-primary">Calculate</button>
          <button type="button" id="reset-btn" class="btn-secondary">Reset</button>
        </div>
      </form>

      <section id="results" class="card results hidden" aria-live="polite">
        <h2>Pay Summary</h2>
        <table class="results-table">
          <tbody>
            <tr>
              <td>Regular Pay</td>
              <td id="result-regular" class="amount"></td>
            </tr>
            <tr>
              <td>Overtime Pay (1.5×)</td>
              <td id="result-ot1" class="amount"></td>
            </tr>
            <tr>
              <td>Double Overtime Pay (2×)</td>
              <td id="result-ot2" class="amount"></td>
            </tr>
            <tr class="subtotal-row">
              <td>Gross Pay (before benefits)</td>
              <td id="result-gross-before" class="amount"></td>
            </tr>
            <tr>
              <td>Vacation Pay</td>
              <td id="result-vacation" class="amount"></td>
            </tr>
            <tr>
              <td>Pension Contribution</td>
              <td id="result-pension" class="amount"></td>
            </tr>
            <tr class="total-row">
              <td>Total Paycheck</td>
              <td id="result-total" class="amount"></td>
            </tr>
          </tbody>
        </table>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
